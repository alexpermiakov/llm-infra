{{- $canaryStrategy := eq .Values.rollout.strategy "canary" }}
{{- $albCanary := and $canaryStrategy .Values.ingress.enabled }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.name }}
  labels:
    app: {{ .Values.app.name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.wafEnabled }}
    alb.ingress.kubernetes.io/wafv2-acl-arn: {{ required "platform.wafAclArn is required when ingress.wafEnabled is true" .Values.platform.wafAclArn }}
    {{- end }}
    {{- if .Values.ingress.certificateArn }}
    # PCI-DSS 4.1: HTTPS with TLS certificate
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.ingress.hosts }}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  {{- if $albCanary }}
                  name: use-annotation
                  {{- else }}
                  number: {{ $.Values.service.port }}
                  {{- end }}
          {{- end }}
    {{- end }}
    {{- else }}
    {{- /* No host specified - use path-based routing without host */}}
    - http:
        paths:
          - path: {{ .Values.ingress.path | default "/" }}
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  {{- if $albCanary }}
                  name: use-annotation
                  {{- else }}
                  number: {{ .Values.service.port }}
                  {{- end }}
    {{- end }}
{{- end }}
