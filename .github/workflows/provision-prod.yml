name: Provision Prod

on:
  release:
    types: [created]

env:
  AWS_REGION: us-west-2
  BUCKET_NAME: terraform-state-alexidp-prod
  TF_VAR_pr_number: 0
  TF_VAR_environment: prod

jobs:
  provision:
    name: Provision Prod Cluster
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Semver Tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag '$TAG' is not a valid semver format (expected v*.*.*)."
            exit 1
          fi
          echo "Valid semver tag: $TAG"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      - name: Terraform Init
        working-directory: infra/entry
        run: |
          terraform init \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="bucket=${{ env.BUCKET_NAME }}" \
            -backend-config="key=prod/state.tfstate"

      - name: Terraform Apply - VPC First
        working-directory: infra/entry
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -var='admin_role_arns=${{ vars.ADMIN_ROLE_ARNS }}' \
            -var="target_branch=main" \
            -var="ecr_account_id=${{ vars.ECR_ACCOUNT_ID }}"

      - name: Refresh AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Terraform Apply - Full
        id: tf_apply_full
        continue-on-error: true
        working-directory: infra/entry
        run: |
          terraform apply -auto-approve \
            -var='admin_role_arns=${{ vars.ADMIN_ROLE_ARNS }}' \
            -var="target_branch=main" \
            -var="ecr_account_id=${{ vars.ECR_ACCOUNT_ID }}"

      - name: Refresh AWS Credentials for Recovery
        if: steps.tf_apply_full.outcome == 'failure'
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Push errored state to backend
        if: steps.tf_apply_full.outcome == 'failure' && hashFiles('infra/entry/errored.tfstate') != ''
        working-directory: infra/entry
        run: terraform state push errored.tfstate

      - name: Terraform Apply - Full (Retry Once)
        id: tf_apply_full_retry
        if: steps.tf_apply_full.outcome == 'failure'
        continue-on-error: true
        working-directory: infra/entry
        run: |
          terraform apply -auto-approve \
            -var='admin_role_arns=${{ vars.ADMIN_ROLE_ARNS }}' \
            -var="target_branch=main" \
            -var="ecr_account_id=${{ vars.ECR_ACCOUNT_ID }}"

      - name: Fail if Terraform apply still failing
        if: steps.tf_apply_full.outcome == 'failure' && steps.tf_apply_full_retry.outcome == 'failure'
        run: exit 1

      - name: Upload errored Terraform state
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: errored-tfstate-prod-${{ github.run_id }}
          path: infra/entry/errored.tfstate
          if-no-files-found: ignore

